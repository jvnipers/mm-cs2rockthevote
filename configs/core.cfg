// CS2 Rock The Vote - Configuration
// Place this file at: <game_root>/cfg/cs2rtv/core.cfg

"cs2rockthevote"
{
    "RTV"
    {
        // Enable / disable the !rtv / mm_rtv command
        "Enabled"               "1"

        // Number of maps shown in the map vote when triggered by RTV
        "MapsToShow"            "6"

        // Duration in seconds of the vote window
        "VoteDuration"          "60"

        // Percentage of eligible players that must !rtv to start a vote (0-100)
        "VotePercentage"        "51"

        // Seconds between "X more votes needed" reminder messages (0 = off)
        "ReminderInterval"      "120"

        // Seconds to wait after a winning map is chosen before changing
        "MapChangeDelay"        "5"

        // Seconds before players can RTV again after a failed / cancelled vote
        "CooldownDuration"      "30"

        // Seconds after map start before !rtv becomes available
        "MapStartDelay"         "30"
    }

    "MapVote"
    {
        // Enable / disable map votes entirely
        "Enabled"               "1"

        // Number of map options shown per vote
        "MapsToShow"            "6"

        // Duration in seconds of the map vote
        "VoteDuration"          "90"

        // Minimum win percentage required (0 = any winner); triggers runoff if unmet
        "MinWinPercentage"      "0"

        // Run a runoff vote when no map reaches MinWinPercentage
        "RunoffEnabled"         "1"

        // Seconds between countdown announcements during an active vote
        "CountdownInterval"     "15"

        // Re-show the vote menu to players who haven't voted yet
        "ChatChoiceReminder"    "1"

        // Seconds between chat choice reminder messages
        "ChatChoiceInterval"    "15"

        // Allow players to change their vote with !revote / mm_revote
        "EnableRevote"          "1"
    }

    "Nominate"
    {
        // Enable / disable !nominate / mm_nominate
        "Enabled"               "1"

        // Max nominations per player per map (0 = unlimited)
        "NominateLimit"         "1"

        // Admin flag required to use !nominate (blank = everyone can nominate)
        // Examples: "changemap", "root", or a single letter like "g"
        "Permission"            ""

        // Admin flag required to nominate maps not in the local maplist
        // (by workshop ID or API lookup). Blank = anyone can nominate off-list.
        "ExternalNominatePermission" "changemap"
    }

    "MapChooser"
    {
        // Comma-separated !chat command aliases for the admin map change menu
        // Default: !mapmenu and !mm
        "Commands"              "mapmenu,mm"

        // Admin flag required to open the immediate map change menu
        // Blank = everyone can use it
        "Permission"            "changemap"
    }

    "General"
    {
        // Chat prefix prepended to all plugin messages.
        // Color tags: {default} {darkred} {purple} {green} {olive} {lime} {red}
        //             {grey} {yellow} {bluegrey} {blue} {darkblue} {orchid} {lightred} {gold}
        "ChatPrefix"            "{red}[RTV]{default} "

        // Count spectators toward the RTV threshold (1 = yes, 0 = no)
        "IncludeSpectator"      "1"

        // Admin flag required for admin-only commands like !reloadrtv
        // "root" = requires root flag
        "AdminPermission"       "root"

        // Validate workshop maps against the Steam Web API on maplist load
        // Requires SteamApiKey to be set
        "EnableMapValidation"   "0"

        // Steam Web API key for map validation (get from https://steamcommunity.com/dev/apikey)
        "SteamApiKey"           ""

        // Discord webhook URL for dead-map alerts (blank = disabled)
        "DiscordWebhook"        ""

        // CS2KZ tier mode: "classic" or "vanilla" - selects which filter to read nub_tier from
        // Used when building display names from the CS2KZ API
        "KzTierMode"            "classic"
    }
}
